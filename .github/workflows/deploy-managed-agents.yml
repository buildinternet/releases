name: Deploy Managed Agents

on:
  # Auto-deploy on any push to main that touches agent config or skills.
  # Keeps live Anthropic-hosted agents in lockstep with main — prevents the
  # "code changed but agent still registered with old prompt/tools" drift that
  # caused #549 / #555. Push deploys always target production; use
  # workflow_dispatch for staging or targeted deploys.
  push:
    branches: [main]
    paths:
      - managed-agents/src/shared/agent-tools.ts
      - managed-agents/src/shared/worker-prompt.ts
      - managed-agents/src/shared/discovery-prompt.ts
      - managed-agents/src/shared/coordinator-prompt.ts
      - .claude/skills/**
      - scripts/sync-agent-skills.ts
      # CATEGORIES is embedded verbatim in every agent's system prompt, so a
      # taxonomy change shifts the deployed prompt even when no prompt builder
      # moved. Without this, a category-only change re-renders the committed
      # managed-agents/*.yaml (the CI drift gate catches it) but leaves the live
      # agents' embedded list stale until the next prompt/tool deploy.
      - packages/core/src/categories.ts
      # The environment YAML is hand-authored (the env config isn't generated
      # from TS), so it is its own source of truth — editing it must trigger a
      # deploy to apply it via `ant beta:environments update`.
      - managed-agents/*.environment.yaml
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment (agents are separate Anthropic resources per env)
        type: choice
        options: [production, staging]
        default: production
      deploy:
        description: What to deploy
        type: choice
        options: [both, agents, skills]
        default: both
      agent:
        description: Agent scope (used when deploy includes agents)
        type: choice
        options: [all, discovery, worker, coordinator]
        default: all
      apply_via_ant:
        description: Apply agents from the committed managed-agents/*.yaml via the ant CLI (default; uncheck to fall back to the legacy fetch path)
        type: boolean
        default: true

# Queue concurrent runs per env instead of cancelling — an interrupted deploy
# can leave prod with a partially-applied agent config.
concurrency:
  group: deploy-managed-agents-${{ github.event.inputs.environment || 'production' }}
  cancel-in-progress: false

env:
  BUN_VERSION: "1.3.14"
  # On push, deploy everything to production. On workflow_dispatch, honor the
  # chosen inputs. Choice-typed inputs are constrained to the allowlists above,
  # so interpolating them into run: commands is safe.
  DEPLOY_ENV: ${{ github.event.inputs.environment || 'production' }}
  DEPLOY_TARGET: ${{ github.event.inputs.deploy || 'both' }}
  AGENT_TARGET: ${{ github.event.inputs.agent || 'all' }}
  # Render-then-apply: when '1', the agent steps feed the committed
  # managed-agents/*.yaml to `ant beta:agents update` — now the default. Push
  # deploys and dispatches use it; only a dispatch that explicitly unchecks
  # apply_via_ant ('false') falls back to the legacy fetch path (the rollback).
  AGENT_APPLY_VIA_ANT: ${{ github.event.inputs.apply_via_ant == 'false' && '0' || '1' }}
  ANT_VERSION: "1.10.0"

jobs:
  deploy:
    name: Deploy managed agents/skills
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - run: bun install --frozen-lockfile

      # Only needed for the render-then-apply path. Conditional so default
      # fetch-path deploys never depend on this external download.
      - name: Install ant CLI
        if: ${{ env.AGENT_APPLY_VIA_ANT == '1' }}
        run: |
          curl -fsSL "https://github.com/anthropics/anthropic-cli/releases/download/v${ANT_VERSION}/ant_${ANT_VERSION}_linux_amd64.tar.gz" \
            | sudo tar -xz -C /usr/local/bin ant
          ant --version

      - name: Deploy skills
        if: ${{ env.DEPLOY_TARGET == 'both' || env.DEPLOY_TARGET == 'skills' }}
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: bun run deploy:skills -- --env "$DEPLOY_ENV"

      - name: Deploy agents (both)
        if: ${{ (env.DEPLOY_TARGET == 'both' || env.DEPLOY_TARGET == 'agents') && env.AGENT_TARGET == 'all' }}
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: bun run deploy:agents -- --env "$DEPLOY_ENV"

      - name: Deploy discovery agent
        if: ${{ (env.DEPLOY_TARGET == 'both' || env.DEPLOY_TARGET == 'agents') && env.AGENT_TARGET == 'discovery' }}
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: bun run deploy:agents:discovery -- --env "$DEPLOY_ENV"

      - name: Deploy worker agent
        if: ${{ (env.DEPLOY_TARGET == 'both' || env.DEPLOY_TARGET == 'agents') && env.AGENT_TARGET == 'worker' }}
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: bun run deploy:agents:worker -- --env "$DEPLOY_ENV"

      - name: Deploy coordinator agent
        if: ${{ (env.DEPLOY_TARGET == 'both' || env.DEPLOY_TARGET == 'agents') && env.AGENT_TARGET == 'coordinator' }}
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: bun run deploy:agents:coordinator -- --env "$DEPLOY_ENV"
