name: Deploy Managed Agents

on:
  workflow_dispatch:
    inputs:
      deploy:
        description: What to deploy
        type: choice
        options: [both, agents, skills]
        default: both
      agent:
        description: Agent scope (used when deploy includes agents)
        type: choice
        options: [all, discovery, worker]
        default: all

env:
  BUN_VERSION: "1.3.11"

jobs:
  deploy:
    name: Deploy managed agents/skills
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-

      - run: bun install --frozen-lockfile

      - name: Deploy skills
        if: ${{ inputs.deploy == 'both' || inputs.deploy == 'skills' }}
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: bun run deploy:skills

      - name: Deploy agents (both)
        if: ${{ (inputs.deploy == 'both' || inputs.deploy == 'agents') && inputs.agent == 'all' }}
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: bun run deploy:agents

      - name: Deploy discovery agent
        if: ${{ (inputs.deploy == 'both' || inputs.deploy == 'agents') && inputs.agent == 'discovery' }}
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: bun run deploy:agents:discovery

      - name: Deploy worker agent
        if: ${{ (inputs.deploy == 'both' || inputs.deploy == 'agents') && inputs.agent == 'worker' }}
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: bun run deploy:agents:worker
