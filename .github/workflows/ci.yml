name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install --frozen-lockfile

      - name: Oxlint
        run: bun run lint

      - name: Prettier
        run: bun run format:check

  test:
    name: Test & Type-check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install --frozen-lockfile

      - name: Type-check
        run: npx tsc --noEmit

      - name: Check migration filenames
        if: github.event_name == 'pull_request'
        env:
          BASE_REF: ${{ github.base_ref }}
        run: ./scripts/check-migration-filenames.sh "origin/$BASE_REF"

      - name: Check for uncommitted schema drift
        run: |
          RELEASED_DATA_DIR=/tmp/drizzle-drift-check bunx drizzle-kit generate > /tmp/drift.log 2>&1
          if ! grep -q "No schema changes" /tmp/drift.log; then
            echo "ERROR: schema.ts has changes that weren't captured by 'bun run db:generate'." >&2
            tail -20 /tmp/drift.log >&2
            exit 1
          fi

      - name: Run tests
        run: bun run test
