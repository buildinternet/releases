name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install --frozen-lockfile

      - name: Oxlint
        run: bun run lint

      - name: Prettier
        run: bun run format:check

  test:
    name: Test & Type-check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install --frozen-lockfile

      - name: Type-check
        run: npx tsc --noEmit

      - name: Check migration filenames
        if: github.event_name == 'pull_request'
        env:
          BASE_REF: ${{ github.base_ref }}
        run: ./scripts/check-migration-filenames.sh "origin/$BASE_REF"

      - name: Pair schema changes with a wrangler migration (PR only)
        if: github.event_name == 'pull_request'
        env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          # If a schema file changed on this PR, require at least one added
          # file under workers/api/migrations/. Catches schema changes that
          # ship without a paired wrangler migration.
          schema_changed=$(git diff --name-only "origin/$BASE_REF"...HEAD -- \
            'packages/core/src/schema.ts' \
            'src/db/schema-coverage.ts' \
            'workers/api/src/db/schema-cron.ts' || true)
          if [ -z "$schema_changed" ]; then
            echo "No schema files changed — pairing check skipped."
            exit 0
          fi
          added=$(git diff --name-only --diff-filter=A "origin/$BASE_REF"...HEAD -- 'workers/api/migrations/*.sql' || true)
          if [ -z "$added" ]; then
            echo "ERROR: schema files changed, but this PR adds no file under workers/api/migrations/." >&2
            echo "Changed schema files:" >&2
            echo "$schema_changed" | sed 's/^/  /' >&2
            echo "Hand-author the wrangler migration and commit it alongside the schema change." >&2
            echo "Preview the SQL with: bun run db:generate (output goes to .drizzle-out/)." >&2
            exit 1
          fi
          echo "Schema files changed:"
          echo "$schema_changed" | sed 's/^/  /'
          echo "Found new wrangler migration file(s):"
          echo "$added" | sed 's/^/  /'

      - name: Run tests
        run: bun run test

  check-agent-tools-drift:
    name: Agent tools / prompt drift check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install --frozen-lockfile

      - name: Check agent tools and prompt hashes
        run: |
          TOOLS_HASH=$(bun -e "
            import { AGENT_TOOLS } from './src/shared/agent-tools.js';
            import { createHash } from 'crypto';
            console.log(createHash('sha256').update(JSON.stringify(AGENT_TOOLS)).digest('hex').slice(0, 16));
          ")
          PROMPT_HASH=$(bun -e "
            import { buildDiscoverySystemPrompt } from './src/shared/discovery-prompt.js';
            import { CATEGORIES } from '@buildinternet/releases-core/categories';
            import { createHash } from 'crypto';
            const p = buildDiscoverySystemPrompt({ evaluateAvailable: true, categories: CATEGORIES });
            console.log(createHash('sha256').update(p).digest('hex').slice(0, 16));
          ")
          WORKER_HASH=$(bun -e "
            import { buildWorkerSystemPrompt } from './src/shared/worker-prompt.js';
            import { CATEGORIES } from '@buildinternet/releases-core/categories';
            import { createHash } from 'crypto';
            const p = buildWorkerSystemPrompt({ categories: CATEGORIES });
            console.log(createHash('sha256').update(p).digest('hex').slice(0, 16));
          ")

          echo "Computed hashes:"
          echo "  toolsHash:        $TOOLS_HASH"
          echo "  promptHash:       $PROMPT_HASH"
          echo "  workerPromptHash: $WORKER_HASH"

          FAIL=0
          for CFG in scripts/agent-skills.json scripts/agent-skills.staging.json; do
            STORED_TOOLS=$(bun -e "import cfg from './${CFG}' assert { type: 'json' }; console.log(cfg.toolsHash ?? '')")
            STORED_PROMPT=$(bun -e "import cfg from './${CFG}' assert { type: 'json' }; console.log(cfg.promptHash ?? '')")
            STORED_WORKER=$(bun -e "import cfg from './${CFG}' assert { type: 'json' }; console.log(cfg.workerPromptHash ?? '')")

            echo ""
            echo "${CFG}:"
            echo "  toolsHash        stored=${STORED_TOOLS}  computed=${TOOLS_HASH}"
            echo "  promptHash       stored=${STORED_PROMPT}  computed=${PROMPT_HASH}"
            echo "  workerPromptHash stored=${STORED_WORKER}  computed=${WORKER_HASH}"

            if [ "$STORED_TOOLS" != "$TOOLS_HASH" ] || [ "$STORED_PROMPT" != "$PROMPT_HASH" ] || [ "$STORED_WORKER" != "$WORKER_HASH" ]; then
              echo "  DRIFT DETECTED in ${CFG}" >&2
              FAIL=1
            fi
          done

          if [ "$FAIL" = "1" ]; then
            echo "" >&2
            echo "One or more hash fields in scripts/agent-skills*.json are out of date." >&2
            echo "If you edited agent-tools.ts, discovery-prompt.ts, or worker-prompt.ts," >&2
            echo "update the JSON hashes before merging:" >&2
            echo "" >&2
            echo "  # No Anthropic credentials required:" >&2
            echo "  bun run deploy:agents:hashes" >&2
            echo "  bun run deploy:agents:hashes -- --env staging" >&2
            echo "" >&2
            echo "  # Or, if you have ANTHROPIC_API_KEY and want a live deploy:" >&2
            echo "  bun run deploy:agents" >&2
            echo "  bun run deploy:agents -- --env staging" >&2
            exit 1
          fi

          echo ""
          echo "All hash fields are up to date."
