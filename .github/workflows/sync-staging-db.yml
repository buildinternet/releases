name: Sync staging DB

# Copies a content-only subset of the prod D1 (released-db) into the
# staging D1 (released-db-staging). Manually dispatched — each run
# replaces staging's content tables. Observability/webhook/vectorize
# tables are deliberately skipped (see scripts/sync-staging-db.sh).

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: Type "yes" to confirm you want to overwrite staging
        required: true
        type: string
        default: "no"

concurrency:
  group: sync-staging-db
  cancel-in-progress: false

env:
  BUN_VERSION: "1.3.11"
  # wrangler 4.88+ requires Node 22+; bunx invokes wrangler's bin via the
  # `#!/usr/bin/env node` shebang, so the runner's Node version is what counts.
  NODE_VERSION: "22"

jobs:
  sync:
    name: Export prod → import staging
    runs-on: ubuntu-latest
    steps:
      - name: Guard against accidental runs
        env:
          CONFIRM: ${{ inputs.confirm }}
        run: |
          if [ "$CONFIRM" != "yes" ]; then
            echo "Refusing to run: 'confirm' input must be exactly 'yes'."
            exit 1
          fi
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-
      - run: bun install --frozen-lockfile
      - name: Run sync
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: ./scripts/sync-staging-db.sh
      - name: Sanity-check row counts
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        working-directory: workers/api
        run: |
          bunx wrangler d1 execute DB --env staging --remote --json \
            --command "SELECT
              (SELECT COUNT(*) FROM organizations)  AS orgs,
              (SELECT COUNT(*) FROM sources)        AS sources,
              (SELECT COUNT(*) FROM releases)       AS releases"
