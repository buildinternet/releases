name: Publish @buildinternet/releases-core

on:
  push:
    branches: [main]
    paths:
      - "packages/core/package.json"
  workflow_dispatch:
    inputs:
      dry-run:
        description: "Dry-run only (no npm publish)"
        type: boolean
        default: false

concurrency:
  group: publish-core
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write # OIDC: mint a short-lived npm publish credential (no NPM_TOKEN)

env:
  BUN_VERSION: "1.3.13"

jobs:
  publish:
    name: Publish packages/core to npm
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: ${{ env.BUN_VERSION }}

      # OIDC trusted publishing needs npm >= 11.5.1 / Node >= 22.14.0. Node 24
      # bundles npm 11.12.1, clearing the bar without an in-place
      # `npm i -g npm@latest` self-upgrade (that races and dies with
      # MODULE_NOT_FOUND 'promise-retry'). bun runs install/tests; npm does the
      # publish + OIDC token exchange. No registry-url here on purpose — an
      # empty _authToken line breaks OIDC (npm/cli#8976).
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24.15.0 # pinned: bundles npm 11.12.1 (see comment above)

      - run: bun install --frozen-lockfile

      - name: Type-check
        run: npx tsc --noEmit

      - name: Run tests
        run: bun run test

      - name: Read version
        id: version
        run: echo "version=$(jq -r .version packages/core/package.json)" >> "$GITHUB_OUTPUT"

      - name: Check if version already published
        id: check
        env:
          CORE_VERSION: ${{ steps.version.outputs.version }}
        run: |
          if npm view "@buildinternet/releases-core@${CORE_VERSION}" version >/dev/null 2>&1; then
            echo "already=true" >> "$GITHUB_OUTPUT"
            echo "Version ${CORE_VERSION} already on npm — skipping publish." >&2
          else
            echo "already=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish
        if: steps.check.outputs.already == 'false'
        working-directory: packages/core
        env:
          DRY_RUN: ${{ inputs.dry-run }}
          # Source repo is private — npm provenance is unsupported from private
          # repos, and trusted publishing would otherwise try to attach it and
          # fail. OIDC still provides the (tokenless) publish credential.
          NPM_CONFIG_PROVENANCE: "false"
        run: |
          if [ "${DRY_RUN}" = "true" ]; then
            npm publish --dry-run
          else
            npm publish
          fi
