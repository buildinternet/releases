name: Smoke catalog web

# Manual post-deploy / on-demand catalog smoke for GraphQL-backed web routes
# (#2057). Not on pull_request — public GETs against a live origin, not a PR
# preview. Run after a web or API deploy that might break SSR/PQ pages.
on:
  workflow_dispatch:
    inputs:
      base_url:
        description: Web origin to smoke (no trailing slash)
        type: string
        default: https://releases.sh
      api_url:
        description: API origin used to resolve a release fixture id
        type: string
        default: https://api.releases.sh

concurrency:
  group: smoke-catalog-web-${{ github.event.inputs.base_url }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  BUN_VERSION: "1.3.14"

jobs:
  smoke:
    name: Catalog pages (HTTP 2xx)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Run catalog smoke matrix
        env:
          BASE_URL: ${{ inputs.base_url }}
          API_URL: ${{ inputs.api_url }}
        run: bun scripts/smoke-catalog-web.ts
