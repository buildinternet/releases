query HomepageTicker($limit: Int!, $exclude: [SourceType!]!) {
  latestReleases(limit: $limit, excludeSourceTypes: $exclude) {
    items {
      id
      title
      version
      publishedAt
      titleGenerated
      titleShort
      source {
        org {
          slug
          name
          avatarUrl
        }
        product {
          slug
          name
        }
        appStore {
          platform
          iconUrl
        }
        video {
          provider
        }
      }
    }
  }
}
