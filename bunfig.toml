# Bun configuration for the CLI and local tooling.
# Workers are isolated via package.json "workspaces" so Bun treats them
# as separate packages and won't resolve their Cloudflare-only imports
# when running the CLI (bun src/index.ts).

[test]
# Stub cloudflare:workers so worker tests under workers/*/test/ can import DOs
# from any CWD. The mock is a no-op for tests that don't import it.
preload = ["./workers/api/test/setup.ts"]
