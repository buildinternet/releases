# Hand-maintained definition of the live managed-agent environment (staging).
# WRITABLE subset only: `ant beta:environments update` rejects the server-managed
# config fields that `retrieve` returns (packages / init_script / environment)
# with "Extra inputs are not permitted", so config carries just type + networking
# (the body these envs were originally created with). The server re-injects the
# managed defaults; verify ignores them.
# Apply runs on deploy (ant). Verify: bun scripts/verify-managed-agents.ts --env staging
name: releases-agents-staging
description: Staging agents env for releases.sh
scope: organization
config:
  type: cloud
  networking:
    type: unrestricted
