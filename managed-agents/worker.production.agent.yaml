            - database
            - design
            - developer-tools
            - devops
            - finance
            - framework
            - infrastructure
            - observability
            - productivity
            - security
          description: Category slug
        tags:
          type: array
          items:
            type: string
          description: Tags to add
        platform:
          type: string
          description: Platform name for link_account (github, x, linkedin, etc.)
        handle:
          type: string
          description: Account handle for link_account
        discovery:
          type: string
          enum:
            - curated
            - agent
            - on_demand
          description: Promote/demote discovery status (edit only)
      required:
        - action
  - type: custom
    name: manage_product
    description: "Create or modify a product (grouping layer under an organization). Actions: add (create new), edit (update fields), tag_add (add tags). Valid categories: ai, cloud, commerce, crm, database, design, developer-tools, devops, finance, framework, infrastructure, observability, productivity, security."
    input_schema:
      type: object
      properties:
        action:
          type: string
          enum:
            - add
            - edit
            - tag_add
          description: Operation to perform
        name:
          type: string
          description: Product name (required for add)
        organization:
          type: string
          description: Organization ID (org_...) or slug (required for add)
        identifier:
          type: string
          description: Product ID (prod_...) or org-scoped coordinate (orgSlug/productSlug) (required for edit, tag_add). Bare slugs are not accepted.
        url:
          type: string
          description: Canonical product URL
        description:
          type: string
          description: Brief product description
        category:
          type: string
          enum:
